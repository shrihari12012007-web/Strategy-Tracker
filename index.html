<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Strategy Tracker</title>
</head>
<body class="bg-gradient-to-br from-blue-500 to-purple-600 min-h-screen p-8">
    <div class="max-w-md mx-auto bg-white/20 backdrop-blur-lg border border-white/30 p-6 rounded-2xl shadow-2xl">
        <h1 class="text-2xl font-bold mb-4">Strategy Tracker</h1>
        
        <div class="flex justify-center my-6">
            <div class="relative size-32">
                <svg class="size-full -rotate-90" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="18" cy="18" r="16" fill="none" class="stroke-current text-gray-200" stroke-width="2"></circle>
                  <circle id="progressCircle" cx="18" cy="18" r="16" fill="none" class="stroke-current transition-colors duration-500" stroke-width="2" stroke-dasharray="100" stroke-dashoffset="100" stroke-linecap="round"></circle>
                </svg>
                <div class="absolute inset-0 flex items-center justify-center">
                    <span id="percent" class="text-2xl font-bold text-blue-600">0%</span>
                </div>
            </div>
        </div>

        <div class="flex gap-2 mb-4">
            <input type="text" id="taskInput" placeholder="New routine..." class="border p-2 flex-grow rounded">
            <button onclick="addTask()" class="bg-blue-600 text-white px-4 py-2 rounded">Add</button>
        </div>

        <div id="taskList" class="space-y-3"></div>
    </div>
    <script src="script.js"></script>
<div class="mt-6 border-t border-white/20 pt-4">
    <label class="text-white text-sm">Set Routine Alarm:</label>
    <div class="flex gap-2 mt-2">
        <input type="time" id="alarmInput" class="bg-white/10 border border-white/20 text-white rounded p-2 flex-grow">
        <button onclick="activateAlarm()" class="bg-white/20 text-white px-4 py-2 rounded hover:bg-white/30">Set</button>
    </div>
</div>
<div class="mt-6 border-t border-white/20 pt-4 space-y-4">
    
    <div>
        <label class="text-white text-sm block mb-1">Set Routine Alarm (Time Setter):</label>
        <div class="flex gap-2">
            <input type="time" id="alarmInput" class="bg-white/10 border border-white/20 text-white rounded p-2 flex-grow">
            <button onclick="activateAlarm()" class="bg-white/20 text-white px-4 py-2 rounded hover:bg-white/30 transition">Set</button>
        </div>
    </div>

    <div>
        <label class="text-white text-sm block mb-1">Live Local Time Check:</label>
        <button onclick="checkLocalTime()" class="w-full bg-blue-500/30 text-white px-4 py-2 rounded hover:bg-blue-500/50 transition">Check Local Time Now</button>
        <p id="currentTimeDisplay" class="text-white/70 text-xs mt-2 text-center"></p>
    </div>
    <button id="stopAlarmBtn" onclick="stopAlarm()" class="hidden w-full bg-red-600 text-white px-4 py-2 rounded font-bold">STOP ALARM</button>
    
</div>
</body>
</html>
