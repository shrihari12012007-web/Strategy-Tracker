<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Strategy Tracker</title>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-md">
        <h1 class="text-2xl font-bold mb-4">Strategy Tracker</h1>
        
        <!-- Progress Bar -->
        <div class="mb-4">
            <div class="flex justify-between mb-1">
                <span class="text-sm font-medium">Weekly Progress</span>
                <span id="percent" class="text-sm font-medium">0%</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2.5">
                <div id="progressBar" class="bg-blue-600 h-2.5 rounded-full" style="width: 0%"></div>
            </div>
        </div>

        <!-- Input Field -->
        <div class="flex gap-2 mb-4">
            <input type="text" id="taskInput" placeholder="New routine..." class="border p-2 flex-grow rounded">
            <button onclick="addTask()" class="bg-blue-600 text-white px-4 py-2 rounded">Add</button>
        </div>

        <div id="taskList" class="space-y-3"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
<!-- Circular Progress -->
<div class="flex justify-center my-6">
    <div class="relative size-32">
        <svg class="size-full -rotate-90" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
            <!-- Background Circle -->
            <circle cx="18" cy="18" r="16" fill="none" class="stroke-current text-gray-200" stroke-width="2"></circle>
            <!-- Progress Circle -->
            <circle id="progressCircle" cx="18" cy="18" r="16" fill="none" class="stroke-current text-blue-600" stroke-width="2" stroke-dasharray="100" stroke-dashoffset="100" stroke-linecap="round"></circle>
        </svg>
        <div class="absolute inset-0 flex items-center justify-center">
            <span id="percent" class="text-2xl font-bold text-blue-600">0%</span>
        </div>
    </div>
</div>
